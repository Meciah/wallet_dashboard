name: Update portfolio static data

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-portfolio-data
  cancel-in-progress: true

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "23"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build latest portfolio snapshot
        env:
          SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}
        run: |
          npm run init-db
          npm run ingest -- --rpc-url "$SOLANA_RPC_URL"
          npm run export-static
          npm run build

      - name: Commit updated Pages assets
        env:
          SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          attempt=1
          while [ "$attempt" -le 3 ]; do
            git add docs

            if git diff --cached --quiet; then
              echo "No Pages changes to commit."
              exit 0
            fi

            git commit -m "chore: update wallet dashboard data"

            if git push origin HEAD:main; then
              exit 0
            fi

            echo "Push rejected on attempt $attempt. Refreshing from origin/main and rebuilding."
            git fetch origin main
            git reset --hard origin/main

            npm run init-db
            npm run ingest -- --rpc-url "$SOLANA_RPC_URL"
            npm run export-static
            npm run build

            attempt=$((attempt + 1))
          done

          echo "Failed to publish Pages assets after 3 attempts."
          exit 1
